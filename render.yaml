services:
  # Web Service
  - type: web
    name: woomate
    env: node
    region: frankfurt
    plan: starter
    buildCommand: ./build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: woomate-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@woomate.com
      - key: DEFAULT_ADMIN_PASSWORD
        generateValue: true
      - key: DEFAULT_ADMIN_NAME
        value: Admin User
      - key: ENABLE_EMAIL_NOTIFICATIONS
        value: false
    healthCheckPath: /api/health

databases:
  - name: woomate-db
    databaseName: woomate
    plan: starter
    region: frankfurt
